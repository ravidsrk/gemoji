name: Test

on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        ruby: ["2.7", "3.0", "3.1", "3.2", "3.3", "3.4"]

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{matrix.ruby}}
        bundler-cache: true
    
    - name: Run tests
      run: bundle exec rake

    - name: Verify db:dump matches committed emoji.json
      run: |
        bundle exec rake db:generate
        ruby -Ilib db/dump.rb > /tmp/emoji.json
        diff -q /tmp/emoji.json db/emoji.json